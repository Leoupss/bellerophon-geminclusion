{{ define "main" }}
<div class="page-inclusions">
  <header class="page-header container">
    <h1 class="page-title">{{ .Title }}</h1>
    {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  </header>

  <div class="filters-bar container" id="filters" aria-label="Filtres">
    <select class="filter-select" id="filter-host" aria-label="{{ .Site.Params.filterHost }}">
      <option value="">{{ .Site.Params.filterHost }} — {{ .Site.Params.filterAll }}</option>
    </select>
    <select class="filter-select" id="filter-origin" aria-label="{{ .Site.Params.filterOrigin }}">
      <option value="">{{ .Site.Params.filterOrigin }} — {{ .Site.Params.filterAll }}</option>
    </select>
    <select class="filter-select" id="filter-treatment" aria-label="{{ .Site.Params.filterTreatment }}">
      <option value="">{{ .Site.Params.filterTreatment }} — {{ .Site.Params.filterAll }}</option>
    </select>
    <button class="filter-reset" id="filter-reset" aria-label="Réinitialiser les filtres">
      Réinitialiser
    </button>
  </div>

  <div class="inclusion-grid container" id="inclusion-grid"
    data-no-results="{{ .Site.Params.noResults }}">
    {{ range .Pages }}
      {{ partial "inclusion-card.html" . }}
    {{ end }}
  </div>

  <p class="no-results" id="no-results" hidden>{{ .Site.Params.noResults }}</p>
</div>
{{ end }}
