{{ define "main" }}
<div class="page-generic container">
  <header class="page-header">
    <h1 class="page-title">{{ .Title }}</h1>
    <div class="single-rule"></div>
  </header>
  {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  {{ if .Pages }}
  <ul class="generic-list">
    {{ range .Pages }}
    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
    {{ end }}
  </ul>
  {{ end }}
</div>
{{ end }}
