<div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="{{ if eq .Lang "fr" }}Visionneuse plein écran{{ else }}Full screen viewer{{ end }}" hidden>
  <button class="lightbox-close" aria-label="{{ if eq .Lang "fr" }}Fermer{{ else }}Close{{ end }}">&times;</button>
  <div class="lightbox-backdrop"></div>
  <div class="lightbox-content">
    <figure class="lightbox-figure">
      <img id="lightbox-img" src="" alt="" loading="lazy">
      <figcaption id="lightbox-caption" class="lightbox-caption"></figcaption>
    </figure>
  </div>
</div>
